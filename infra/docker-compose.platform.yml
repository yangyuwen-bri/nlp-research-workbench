services:
  postgres:
    image: postgres:16
    container_name: nlp-tool-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: nlp_workbench
      POSTGRES_USER: nlp
      POSTGRES_PASSWORD: nlp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nlp -d nlp_workbench"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: nlp-tool-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
